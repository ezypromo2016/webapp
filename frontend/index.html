<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SwiftPOS">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="SwiftPOS - Modern Point of Sale System">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>CBKPOS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- jsPDF for receipt export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" class="loading-screen">
  <div class="logo-icon" style="width:56px;height:56px;border-radius:16px;font-size:28px;">🏪</div>
  <div class="spinner"></div>
  <p style="color:#5a5a78;font-size:0.8rem;font-family:'DM Mono',monospace;">Loading SwiftPOS...</p>
</div>

<!-- App Root -->
<div id="app" style="display:none;"></div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Sidebar Overlay (mobile) -->
<div id="sidebar-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;" onclick="closeSidebar()"></div>

<!-- Utility Scripts (always needed) -->
<script src="/js/utils/storage.js?v=1.0.1"></script>
<script src="/js/utils/api.js?v=1.0.1"></script>
<script src="/js/utils/sync.js?v=1.0.1"></script>
<script src="/js/utils/receipt.js?v=1.0.1"></script>

<!-- Auth module (needed immediately for login screen) -->
<script src="/js/modules/auth.js?v=1.0.1"></script>

<!-- App controller (remaining modules are loaded on-demand) -->
<script src="/js/app.js?v=1.0.1"></script>

</body>
</html>
