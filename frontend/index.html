<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SwiftPOS</title>
  <link rel="stylesheet" href="/css/main.css">
  <!-- Fonts & External Scripts remain the same -->
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading SwiftPOS...</p>
</div>

<div id="app"></div>
<div id="toast-container"></div>

<!-- Core Utilities -->
<script src="js/utils/storage.js"></script>
<script src="js/utils/api.js"></script>
<script src="js/utils/sync.js"></script>
<script src="js/utils/receipt.js"></script>

<!-- Modules[cite: 6] -->
<!-- Modules -->
<!-- Add ?v=1 (or any number/date) to the end of your script paths -->

<script src="js/modules/transactions.js?v=1"></script>
<script src="js/modules/inventory.js?v=1"></script>

<script src="js/modules/auth_2.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/pos.js"></script>
<script src="js/modules/products_2.js"></script>
  
<script src="js/app.js?v=1"></script>

<script>
  window.addEventListener('load', function() {
    var required = ['Storage','API','Auth','Dashboard','POS','Products','Transactions','Inventory','App'];
    var missing = required.filter(function(m) { return typeof window[m] === 'undefined'; });
    
    if (missing.length > 0) {
      console.error('Missing modules:', missing);
      
      if (typeof window.App !== 'undefined') return;

      document.getElementById('loading-screen').innerHTML =
        '<div style="text-align:center;padding:32px;">' +
        '<div style="font-size:2rem;margin-bottom:16px;">⚠️</div>' +
        '<p style="color:#ef4444;margin-bottom:8px;">Failed to load: ' + missing.join(', ') + '</p>' +
        '<p style="color:#5a5a78;font-size:0.85rem;margin-bottom:16px;">Check your connection and try again.</p>' +
        '<button onclick="location.reload()" style="background:#6366f1;color:white;border:none;' +
        'padding:10px 24px;border-radius:8px;cursor:pointer;font-size:1rem;">Reload</button>' +
        '</div>';
    }
  });
</script>
</body>
</html>
