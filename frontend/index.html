<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SwiftPOS">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="SwiftPOS - Modern Point of Sale System">
  <title>SwiftPOS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/css/main.css">

  <style>
    /* Inline critical styles so app shows even if CSS fails */
    body { margin:0; background:#0a0a0f; color:#e8e8f0; font-family:sans-serif; }
    #loading-screen {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100vh; gap:16px;
    }
    .spinner {
      width:36px; height:36px;
      border:3px solid #2a2a3a;
      border-top-color:#6366f1;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #app { display:none; min-height:100vh; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div style="width:56px;height:56px;border-radius:16px;background:#6366f1;
    display:flex;align-items:center;justify-content:center;font-size:28px;
    box-shadow:0 0 30px rgba(99,102,241,0.4);">&#127978;</div>
  <div class="spinner"></div>
  <p style="color:#5a5a78;font-size:0.8rem;font-family:'DM Mono',monospace;margin:0;">
    Loading SwiftPOS...
  </p>
</div>

<!-- App Root -->
<div id="app"></div>

<!-- Toast Container -->
<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:2000;
  display:flex;flex-direction:column;gap:8px;"></div>

<!-- Sidebar Overlay (mobile) -->
<div id="sidebar-overlay" class="hidden"
  style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;display:none;"
  onclick="closeSidebar()"></div>

<!-- ── Load all JS modules in correct order ── -->
<script src="/js/utils/storage.js"></script>
<script src="/js/utils/api.js"></script>
<script src="/js/utils/sync.js"></script>
<script src="/js/utils/receipt.js"></script>
<script src="/js/modules/auth.js"></script>
<script src="/js/modules/dashboard.js"></script>
<script src="/js/modules/pos.js"></script>
<script src="/js/modules/products.js"></script>
<script src="/js/modules/transactions.js"></script>
<script src="/js/modules/inventory.js"></script>
<script src="/js/app.js"></script>

<!-- ── Guard: detect if any script failed to load ── -->
<script>
  window.addEventListener('load', function() {
    var required = ['Storage','API','Auth','Dashboard','POS','Products','Transactions','Inventory','App'];
    var missing = required.filter(function(m) { return typeof window[m] === 'undefined'; });
    if (missing.length > 0) {
      console.error('Missing modules:', missing);
      // Try to still boot if App loaded
      if (typeof window.App !== 'undefined') return;
      // Show friendly error
      document.getElementById('loading-screen').innerHTML =
        '<div style="text-align:center;padding:32px;">' +
        '<div style="font-size:2rem;margin-bottom:16px;">&#9888;</div>' +
        '<p style="color:#ef4444;margin-bottom:8px;">Failed to load: ' + missing.join(', ') + '</p>' +
        '<p style="color:#5a5a78;font-size:0.85rem;margin-bottom:16px;">Check your internet connection and try again.</p>' +
        '<button onclick="location.reload()" style="background:#6366f1;color:white;border:none;' +
        'padding:10px 24px;border-radius:8px;cursor:pointer;font-size:1rem;">Reload</button>' +
        '</div>';
    }
  });
</script>

</body>
</html>
