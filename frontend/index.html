<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SwiftPOS</title>
  <link rel="stylesheet" href="/css/main.css">
  <!-- Fonts & External Scripts remain the same -->
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading SwiftPOS...</p>
</div>

<div id="app"></div>
<div id="toast-container"></div>

<!-- Core Utilities -->
<script src="/js/utils/storage.js"></script>
<script src="/js/utils/api.js"></script>
<script src="/js/utils/sync.js"></script>
<script src="/js/utils/receipt.js"></script>

<!-- Modules[cite: 6] -->
<script src="/js/modules/auth.js"></script>
<script src="/js/modules/dashboard.js"></script>
<script src="/js/modules/pos.js"></script> <!-- Updated version below -->
<script src="/js/modules/products.js"></script>
<script src="/js/modules/transactions.js"></script>
<script src="/js/modules/inventory.js"></script>

<!-- App Entry Point[cite: 6] -->
<script src="/js/app.js"></script>

<script>
  window.addEventListener('load', function() {
    var required = ['Storage','API','Auth','Dashboard','POS','Products','Transactions','Inventory','App'];
    var missing = required.filter(function(m) { return typeof window[m] === 'undefined'; });
    if (missing.length > 0) {
      console.error('Missing modules:', missing);[cite: 6]
    }
  });
</script>
</body>
</html>
